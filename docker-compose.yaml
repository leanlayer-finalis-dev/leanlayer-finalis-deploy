name: ll-stack

services:
  leanlayer-finalis-service:
    build:
      context: ../leanlayer-finalis-service
      dockerfile: Dockerfile
    image: leanlayer-finalis-service:latest
    working_dir: /app/svc
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      DJANGO_SETTINGS_MODULE: svc.settings.production

      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      MAX_PARALLEL_REQUESTS: "15"
      REQUEST_QUEUE_TIMEOUT_SECONDS: "1.0"

      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ll_service

      REDIS_URL: redis://redis:6379/1
      REDIS_HOST: redis
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"

      LL_SERVICE_URL: http://leanlayer-finalis-service:5555
      LL_CONNECTORS_URL: http://leanlayer-finalis-connectors:5558

      PYTHONPATH: /app/svc:/app
    depends_on:
      - postgres
      - redis
      - chromadb
      - leanlayer-finalis-connectors
    volumes:
      - ../leanlayer-finalis-service/.cache:/app/.cache
      - ../leanlayer-finalis-service/runtime-configs/available_migrated_sources.yaml:/app/svc/configs/available_migrated_sources.yaml
    networks:
      - ll-backend

  leanlayer-finalis-connectors:
    build:
      context: ../leanlayer-finalis-connectors
      dockerfile: Dockerfile
    image: leanlayer-finalis-connectors:latest
    working_dir: /app/svc
    command: gunicorn svc.wsgi:application --bind 0.0.0.0:5558 --workers 3 --timeout 120
    ports:
      - "127.0.0.1:5558:5558"
    environment:
      DJANGO_SETTINGS_MODULE: svc.settings.production
      PYTHONPATH: /app
      LL_SERVICE_URL: http://leanlayer-finalis-service:5555
      LL_CONNECTORS_URL: http://leanlayer-finalis-connectors:5558
      REDIS_URL: redis://redis:6379/1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ll_service
      ALLOWED_HOSTS: "*"
    networks:
      - ll-backend

  scheduler:
    build:
      context: ../leanlayer-finalis-service
      dockerfile: scheduler/Dockerfile
    image: ll-scheduler:latest
    restart: on-failure
    environment:
      REDIS_HOST: redis
      LL_SERVICE_URL: http://leanlayer-finalis-service:5555
      LL_CONNECTORS_URL: http://leanlayer-finalis-connectors:5558
      POSTGRES_HOST: postgres
      ROUTINE_TIMEOUT: "360"
    volumes:
      - ../leanlayer-finalis-service/scheduler:/app/scheduler
      - ../leanlayer-finalis-service/chat:/app/chat
      - ../leanlayer-finalis-service/secrets_loader.py:/app/secrets_loader.py
      - ../leanlayer-finalis-service/data/snapshots/postgres:/snapshots/postgres
      - ../leanlayer-finalis-service/data/snapshots/chromadb:/snapshots/chromadb
      - ../leanlayer-finalis-service/data/chromadb:/chroma/chroma:ro
    depends_on:
      - postgres
      - leanlayer-finalis-service
      - leanlayer-finalis-connectors
    networks:
      - ll-backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ll_service
      POSTGRES_USER: ll_service
      POSTGRES_PASSWORD: ll_service
    ports:
      - "5432:5432"
    volumes:
      - ../leanlayer-finalis-service/data/postgres:/var/lib/postgresql/data
    networks:
      - ll-backend

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ../leanlayer-finalis-service/data/redis:/data
    networks:
      - ll-backend

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ../leanlayer-finalis-service/data/chromadb:/chroma/chroma
    networks:
      - ll-backend

networks:
  ll-backend:
    driver: bridge